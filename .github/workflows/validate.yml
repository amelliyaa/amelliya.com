name: Validate Build
on:
  pull_request:
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v6

      - name: Checkout Content Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: amelliyaa/amelliya.com-content
          path: src/content

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/krypton

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Boot Preview
        run: |
          npm run preview &
          echo "PREVIEW_PID=$!" >> $GITHUB_ENV
          npx wait-on http://localhost:4321

      - name: Validate HTML
        run: npm run test:html

      - name: Validate Links
        run: npm run test:links

      - name: Validate Accessibility
        run: npm run test:a11y

      - name: Kill Preview
        if: always()
        run: kill ${{ env.PREVIEW_PID }} || true
